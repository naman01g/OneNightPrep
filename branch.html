<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Choose a second-year subject to start your OneNight.Prep plan.">
  <title>Branch Subjects — OneNight.Prep</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js" defer></script>
  <script src="js/cursor-light.js" defer></script>
  <script type="module" src="js/auth.js"></script>
</head>
<body>
  <div class="site-shell">
    <aside id="ad-banner" aria-label="Advertisement">
      <span>Advertisement</span>
      <p>Your study break could be here</p>
    </aside>

    <header class="topbar">
      <a class="back-link" id="branch-back-link" href="year2.html" aria-label="Back to branch selection">
        <span aria-hidden="true">←</span> Back to branches
      </a>
      <a class="mini-logo" href="index.html">OneNight<span>.Prep</span></a>
    </header>

    <main class="content-main">
      <section class="page-heading">
        <p class="eyebrow">Step 04 · Choose a subject</p>
        <h1 id="selected-branch">Your Branch</h1>
        <p><span id="selected-exam">Your exam</span> · Choose a subject to continue.</p>
      </section>

      <section class="subject-grid" id="subject-grid" aria-label="Branch subjects">
        <p style="color:var(--muted)">Loading subjects...</p>
      </section>
    </main>
  </div>
  <script type="module">
    import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { db } from "./js/firebase.js";

    const params = new URLSearchParams(window.location.search);
    const year = params.get("year") || "2nd Year";
    const exam = params.get("exam") || "";
    const branch = params.get("branch") || "";
    const grid = document.getElementById("subject-grid");

    const buildUrl = (page, values = {}) => {
      const urlParams = new URLSearchParams();
      Object.entries(values).forEach(([key, value]) => {
        if (value !== null && value !== undefined) {
          urlParams.set(key, value);
        }
      });
      return `${page}?${urlParams.toString()}`;
    };

    const loadSubjects = async () => {
      try {
        const subjectQuery = query(collection(db, "subjects"), where("branch", "==", branch));
        const snapshot = await getDocs(subjectQuery);
        const subjects = snapshot.docs.map((subjectDoc) => ({ id: subjectDoc.id, ...subjectDoc.data() }));

        grid.innerHTML = "";

        if (subjects.length === 0) {
          grid.innerHTML = `<p style="color:var(--muted)">No subjects added yet. Check back soon!</p>`;
          return;
        }

        subjects.forEach((subject, index) => {
          const num = String(index + 1).padStart(2, "0");
          const subjectHref = buildUrl("time.html", { year, exam, branch, subject: subject.name });

          if (subject.comingSoon) {
            grid.innerHTML += `
              <div class="subject-card" style="opacity:0.5;cursor:not-allowed;">
                <span>${num}</span>
                <strong>${subject.name}</strong>
                <i style="color:var(--muted)">Coming Soon</i>
              </div>`;
          } else {
            grid.innerHTML += `
              <a class="subject-card" href="${subjectHref}" data-subject="${subject.name}" target="_blank" rel="noopener">
                <span>${num}</span>
                <strong>${subject.name}</strong>
                <i>Start prep →</i>
              </a>`;
          }
        });
      } catch (err) {
        console.error(err);
        grid.innerHTML = `<p style="color:var(--muted)">Error loading subjects. Please try again.</p>`;
      }
    };

    loadSubjects();
  </script>
</body>
</html>
