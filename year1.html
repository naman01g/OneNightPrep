<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Choose a first-year subject to start your OneNight.Prep plan.">
  <title>1st Year Subjects — OneNight.Prep</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js" defer></script>
  <script src="js/cursor-light.js" defer></script>
  <script type="module" src="js/auth.js"></script>
</head>
<body>
  <div class="site-shell">
    <aside id="ad-banner" aria-label="Advertisement">
      <span>Advertisement</span>
      <p>Your study break could be here</p>
    </aside>

    <header class="topbar">
      <a class="back-link" id="year-back-link" href="exam-type.html?year=1st%20Year" aria-label="Back to exam type">
        <span aria-hidden="true">←</span> Back to exam type
      </a>
      <a class="mini-logo" href="index.html">OneNight<span>.Prep</span></a>
    </header>

    <main class="content-main">
      <section class="page-heading">
        <p class="eyebrow">Step 03 · Choose a subject</p>
        <h1>1st Year</h1>
        <p><span id="selected-exam">Your exam</span> · What are we conquering tonight?</p>
      </section>

      <section class="subject-grid" id="subject-grid" aria-label="First-year subjects">
        <p style="color:var(--muted)">Loading subjects...</p>
      </section>
    </main>
  </div>

  <script type="module">
    import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { db } from "./js/firebase.js";

    const params = new URLSearchParams(window.location.search);
    const exam = params.get("exam") || "";
    const grid = document.getElementById("subject-grid");

    const loadSubjects = async () => {
      try {
        const q = query(collection(db, "subjects"), where("branch", "==", "1st Year"));
        const snapshot = await getDocs(q);

        let subjects = [];
        snapshot.forEach(doc => subjects.push({ id: doc.id, ...doc.data() }));

        grid.innerHTML = "";

        if (subjects.length === 0) {
          grid.innerHTML = `<p style="color:var(--muted)">No subjects added yet. Check back soon!</p>`;
          return;
        }

        subjects.forEach((subject, index) => {
          const num = String(index + 1).padStart(2, "0");
          const encodedSubject = encodeURIComponent(subject.name);
          const encodedExam = encodeURIComponent(exam);

          if (subject.comingSoon) {
            grid.innerHTML += `
              <div class="subject-card" style="opacity:0.5;cursor:not-allowed;">
                <span>${num}</span>
                <strong>${subject.name}</strong>
                <i style="color:var(--muted)">Coming Soon</i>
              </div>`;
          } else {
            grid.innerHTML += `
              <a class="subject-card" href="time.html?year=1st%20Year&exam=${encodedExam}&subject=${encodedSubject}" target="_blank" rel="noopener">
                <span>${num}</span>
                <strong>${subject.name}</strong>
                <i>Start prep →</i>
              </a>`;
          }
        });

      } catch (err) {
        console.error(err);
        grid.innerHTML = `<p style="color:var(--muted)">Error loading subjects. Please try again.</p>`;
      }
    };

    loadSubjects();
  </script>
</body>
</html>
