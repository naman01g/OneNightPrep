<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your OneNight.Prep study material is ready.">
  <title>Study Material — OneNight.Prep</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js" defer></script>
  <script src="js/cursor-light.js" defer></script>
  <script type="module" src="js/auth.js"></script>
</head>

<body>
  <div class="site-shell">
    <aside id="ad-banner" aria-label="Advertisement">
      <span>Advertisement</span>
      <p>Your study break could be here</p>
    </aside>
    <header class="topbar">
      <a class="back-link" id="material-back-link" href="time.html" aria-label="Back to time selection">
        <span aria-hidden="true">←</span> Back to time left
      </a>
      <a class="mini-logo" href="index.html">OneNight<span>.Prep</span></a>
    </header>
    <main class="content-main">
      <section class="page-heading">
        <p class="eyebrow">Step 06 · Study material</p>
        <h1 id="selected-subject">Your subject</h1>
        <p id="material-description"><span id="selected-year">Your year</span> · <span id="selected-exam">Your
            exam</span> · <span id="selected-time">Your time left</span></p>
      </section>
      <section class="probability-meter" id="probability-legend" aria-label="Probability meter" hidden></section>
      <section class="subject-grid exam-grid" id="material-grid" aria-label="Study material"></section>
    </main>
  </div>

  <script type="module">
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { db } from "./js/firebase.js";

    const params = new URLSearchParams(window.location.search);
    const year = params.get("year") || "";
    const exam = params.get("exam") || "";
    const subject = params.get("subject") || "";
    const rawTime = params.get("time") || "";
    const time = decodeURIComponent(rawTime.replace(/\+/g, "%20")).replace(/%2B/gi, "+");
    const rawBranch = params.get("branch") || "";
    const grid = document.getElementById("material-grid");
    const probabilityLegend = document.getElementById("probability-legend");

    const normalizeIdPart = (value) => value.trim().replace(/[^a-z0-9]+/gi, "-").replace(/^-|-$/g, "").toLowerCase();

    const getBranch = () => {
      if (year === "1st Year") return "1st Year";
      if (/cse|it/i.test(rawBranch)) return "2nd Year > CSE/IT";
      if (/electrical|ee/i.test(rawBranch)) return "2nd Year > EE";
      if (/electronics|communication|ece/i.test(rawBranch)) return "2nd Year > ECE";
      if (/mechanical/i.test(rawBranch)) return "2nd Year > Mechanical";
      if (/civil/i.test(rawBranch)) return "2nd Year > Civil";
      return rawBranch;
    };

    const getContentDocId = () => [year, getBranch(), exam, subject, time].map(normalizeIdPart).join("_");

    const createCard = (item, clickHandler) => {
      const card = document.createElement("button");
      card.className = "subject-card material-card material-action-card";
      card.type = "button";
      card.innerHTML = `<span>${item.type || "Video"}</span><strong>${item.name}</strong><i>Open →</i>`;
      card.addEventListener("click", () => clickHandler(item));
      return card;
    };

    const createSection = (title, items, clickHandler) => {
      const section = document.createElement("section");
      section.className = "material-folder";
      section.innerHTML = `<h2>${title}</h2>`;

      const folderGrid = document.createElement("div");
      folderGrid.className = "subject-grid exam-grid";

      if (!items.length) {
        const empty = document.createElement("p");
        empty.className = "admin-status";
        empty.textContent = "No items added yet.";
        folderGrid.appendChild(empty);
      } else {
        items.forEach((item) => folderGrid.appendChild(createCard(item, clickHandler)));
      }

      section.appendChild(folderGrid);
      return section;
    };

    const openPdf = (item) => {
      const viewer = document.getElementById("material-viewer");
      viewer.innerHTML = `
        <h2>${item.name}</h2>
        <iframe src="${item.link}" title="${item.name}" loading="lazy"></iframe>
      `;
      viewer.scrollIntoView({ behavior: "smooth", block: "start" });
    };

    const openVideo = (item) => {
      const viewer = document.getElementById("material-viewer");
      viewer.innerHTML = `
        <h2>${item.name}</h2>
        <iframe src="${item.link}" title="${item.name}" loading="lazy" allowfullscreen></iframe>
      `;
      viewer.scrollIntoView({ behavior: "smooth", block: "start" });
    };

    const renderRegularMaterial = (papers, videos) => {
      const solved = papers.filter((paper) => paper.type === "solved");
      const unsolved = papers.filter((paper) => paper.type === "unsolved");

      grid.appendChild(createSection("Solved Papers", solved, openPdf));
      grid.appendChild(createSection("Unsolved Papers", unsolved, openPdf));
      grid.appendChild(createSection("Video Lectures", videos, openVideo));
    };

    const renderTonightMaterial = (papers, videos) => {
      const images = papers.filter((paper) => paper.type === "image");
      const imageSection = document.createElement("section");
      imageSection.className = "material-folder";
      imageSection.innerHTML = `<h2>Question Images</h2>`;

      const imageGrid = document.createElement("div");
      imageGrid.className = "subject-grid exam-grid";

      if (!images.length) {
        const empty = document.createElement("p");
        empty.className = "admin-status";
        empty.textContent = "No images added yet.";
        imageGrid.appendChild(empty);
      } else {
        images.forEach((image) => {
          const card = document.createElement("article");
          card.className = "subject-card material-card question-card";
          card.innerHTML = `<span>${image.name}</span><img class="question-image" src="${image.link}" alt="${image.name}">`;
          imageGrid.appendChild(card);
        });
      }

      imageSection.appendChild(imageGrid);
      grid.appendChild(imageSection);
      grid.appendChild(createSection("Video Lectures", videos, openVideo));
    };

    const loadContent = async () => {
      console.log("Doc ID:", getContentDocId());
      try {
        if (probabilityLegend) probabilityLegend.hidden = true;
        grid.innerHTML = "";

        const snapshot = await getDoc(doc(db, "content", getContentDocId()));
        if (!snapshot.exists()) {
          grid.innerHTML = `<p class="admin-status">No content added yet. Check back soon!</p>`;
          return;
        }

        const data = snapshot.data();
        const papers = Array.isArray(data.papers) ? data.papers : [];
        const videos = Array.isArray(data.videos) ? data.videos : [];

        if (time === "Just Tonight") {
          renderTonightMaterial(papers, videos);
        } else {
          renderRegularMaterial(papers, videos);
        }

        const viewer = document.createElement("section");
        viewer.className = "material-viewer";
        viewer.id = "material-viewer";
        grid.appendChild(viewer);
      } catch (err) {
        console.error(err);
        grid.innerHTML = `<p class="admin-status">Error loading content. Please try again.</p>`;
      }
    };

    loadContent();
  </script>
</body>

</html>
