<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="OneNight.Prep — focused exam preparation, built for the time you have left.">
  <title>OneNight.Prep — Your Exam, One Night Hack</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/cursor-light.js" defer></script>
</head>

<body class="home-page">
  <div class="site-shell">
    <aside id="ad-banner" aria-label="Advertisement">
      <span>Advertisement</span>
      <p>Your study break could be here</p>
    </aside>

    <main class="home-main">
      <section class="hero" aria-labelledby="site-title">
        <div class="logo-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="img">
            <path d="M14 39.5 29.5 24l9 9L51 20.5"/>
            <path d="M40.5 20.5H51V31"/>
          </svg>
        </div>

        <p class="eyebrow">Cram smarter. Stress less.</p>

        <h1 id="site-title">
          OneNight<span>.Prep</span>
        </h1>

        <p class="tagline">Your Exam, One Night Hack</p>

        <p class="hero-copy">
          Pick your year and turn last-minute panic into a focused game plan.
        </p>

        <nav class="year-actions" aria-label="Choose your academic year">

          <!-- 1st Year -->
          <a class="button button-primary button-large"
             href="exam-type.html?year=1st%20Year"
             target="_blank"
             rel="noopener">
            <span>1st Year</span>
            <span class="button-arrow" aria-hidden="true">↗</span>
          </a>

          <!-- 2nd Year -->
          <a class="button button-secondary button-large"
             href="exam-type.html?year=2nd%20Year"
             target="_blank"
             rel="noopener">
            <span>2nd Year</span>
            <span class="button-arrow" aria-hidden="true">↗</span>
          </a>

        </nav>
      </section>
    </main>

    <footer>
      <p>One focused night can change the morning.</p>
    </footer>
  </div>
