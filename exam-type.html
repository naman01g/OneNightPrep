<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Choose your exam type to start your OneNight.Prep plan.">
  <title>Choose Exam Type — OneNight.Prep</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js" defer></script>
  <script src="js/cursor-light.js" defer></script>
  <script type="module" src="js/auth.js"></script>
</head>

<body>
  <div class="site-shell">
    <aside id="ad-banner" aria-label="Advertisement">
      <span>Advertisement</span>
      <p>Your study break could be here</p>
    </aside>

    <header class="topbar">
      <a class="back-link" href="index.html" aria-label="Back to home">
        <span aria-hidden="true">←</span> Back home
      </a>
      <a class="mini-logo" href="index.html">OneNight<span>.Prep</span></a>
    </header>

    <main class="content-main">
      <section class="page-heading">
        <p class="eyebrow">Step 02 · Choose exam type</p>
        <h1>Choose your exam type</h1>
        <p> Aaaallll.... izzzzz..... welllllll....❤️</p>
      </section>

      <section class="subject-grid exam-grid" aria-label="Exam types">
        <a class="subject-card exam-card" href="#" data-exam="ST">
          <span>01</span>
          <strong>ST</strong>
          <i>Choose subjects →</i>
        </a>

        <a class="subject-card exam-card" href="#" data-exam="PUT">
          <span>02</span>
          <strong>PUT</strong>
          <i>Choose subjects →</i>
        </a>

        <a class="subject-card exam-card" href="#" data-exam="End Semester">
          <span>03</span>
          <strong>End Semester</strong>
          <i>Choose subjects →</i>
        </a>
      </section>
    </main>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const year = params.get("year") || "1st Year";

    document.querySelectorAll(".exam-card").forEach(card => {
      const nextPage = year === "2nd Year"
        ? "year2.html"
        : "year1.html";

      card.href =
        `${nextPage}?year=${encodeURIComponent(year)}&exam=${encodeURIComponent(card.dataset.exam)}`;
    });
  </script>
</body>

</html>
